name: Android Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build with Gradle
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
            ./gradlew assembleDebug --no-daemon -PversionName="${VERSION_NAME}" -PversionCode="${VERSION_CODE}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/}"
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
            ./gradlew assembleDebug --no-daemon -PversionName="${VERSION_NAME}" -PversionCode="${VERSION_CODE}"
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Verify APK version metadata
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            EXPECTED_VERSION_NAME="${GITHUB_REF#refs/tags/v}"
            EXPECTED_VERSION_CODE="${GITHUB_RUN_NUMBER}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF}" == refs/tags/* ]]; then
            EXPECTED_VERSION_NAME="${GITHUB_REF#refs/tags/}"
            EXPECTED_VERSION_CODE="${GITHUB_RUN_NUMBER}"
          else
            EXPECTED_VERSION_NAME="$(grep '^versionName=' gradle.properties | cut -d= -f2-)"
            EXPECTED_VERSION_CODE="$(grep '^versionCode=' gradle.properties | cut -d= -f2-)"
          fi

          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "${SDK_ROOT}" ]]; then
            echo "Android SDK root is not set"
            exit 1
          fi

          BUILD_TOOLS_DIR="$(find "${SDK_ROOT}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          if [[ -z "${BUILD_TOOLS_DIR}" ]]; then
            echo "Android build-tools directory not found under ${SDK_ROOT}"
            exit 1
          fi

          AAPT_BIN="${BUILD_TOOLS_DIR}/aapt"
          if [[ ! -x "${AAPT_BIN}" ]]; then
            echo "aapt not found at ${AAPT_BIN}"
            exit 1
          fi

          BADGING="$("${AAPT_BIN}" dump badging app/build/outputs/apk/debug/app-debug.apk)"
          ACTUAL_VERSION_NAME="$(printf '%s\n' "${BADGING}" | sed -n "s/.* versionName='\([^']*\)'.*/\1/p" | head -n1)"
          ACTUAL_VERSION_CODE="$(printf '%s\n' "${BADGING}" | sed -n "s/.* versionCode='\([^']*\)'.*/\1/p" | head -n1)"

          echo "Expected versionName=${EXPECTED_VERSION_NAME} versionCode=${EXPECTED_VERSION_CODE}"
          echo "Actual versionName=${ACTUAL_VERSION_NAME} versionCode=${ACTUAL_VERSION_CODE}"

          [[ "${ACTUAL_VERSION_NAME}" == "${EXPECTED_VERSION_NAME}" ]]
          [[ "${ACTUAL_VERSION_CODE}" == "${EXPECTED_VERSION_CODE}" ]]
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: artifacts

      - name: Rename APK with version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          mv artifacts/app-debug.apk "artifacts/droidrun-portal-${TAG_NAME}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
